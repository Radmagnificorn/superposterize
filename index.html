<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Super Posterizer</title>
    <script src="./js/main.js" type="module"></script>
    <link rel="stylesheet" href="./superposterizer.css">
</head>
    <body>
        <div class="tabs">
            <div role="tablist" aria-label="Apps" class="tablist">
                <button role="tab" aria-selected="true" aria-controls="posterizer-panel" id="posterizer-tab">Posterizer</button>
                <button role="tab" aria-selected="false" aria-controls="newapp-panel" id="newapp-tab" tabindex="-1">Pixel art normalizer</button>
                <button role="tab" aria-selected="false" aria-controls="particles-panel" id="particles-tab" tabindex="-1">Particles</button>
            </div>

            <section id="posterizer-panel" role="tabpanel" aria-labelledby="posterizer-tab">
                <input id="fileSelect" type="file"/>
                <button id="resetButton">Reset</button>
                <button id="downloadImage">Download</button>
                <button id='testButton'>Posterize</button>
                H Step: <input type="number" id="hSplit" min="0" max="1" value="0.01">
                S Step: <input type="number" id="sSplit" min="0" max="0.5" value="0.01" step="0.01">
                <label for="toggleGuy">Toggle Guy: </label>
                <input type="checkbox" name="toggleGuy" id="toggleGuy">
                Scale: <input type="number" id="scale" value="1">
                <canvas id="imageDisplay"></canvas>
                <div id="valueControls">
                    <label for="margin">Margin: </label>
                    <input type="number" id="margin" name="margin" min="0" max="1" value="0">
                    
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.1">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.2">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.5">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.8">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.9">
                    
                </div>
                <img id="sampleCharacter" src="./samplecharacter.png"/>
            </section>

            <section id="newapp-panel" role="tabpanel" aria-labelledby="newapp-tab" hidden>
                <div class="new-app">
                    <h2>Pixel Art Normalizer</h2>
                    <input id="aiFileSelect" type="file" accept="image/*" />
                    <button id="normalizeButton">Analyze + Normalize</button>
                    <label for="normScale">Display Scale: </label>
                    <input type="number" id="normScale" value="8" min="1" step="1" />
                    <label style="margin-left:12px"><input type="checkbox" id="autoDetect" /> Auto-detect grid</label>
                    <label for="blockW">Block W:</label>
                    <input type="number" id="blockW" value="8" min="1" step="1" />
                    <label for="blockH">Block H:</label>
                    <input type="number" id="blockH" value="8" min="1" step="1" />
                    <label for="gridOffsetX" style="margin-left:12px">Grid offset X:</label>
                    <input type="number" id="gridOffsetX" value="0" step="1" />
                    <label for="gridOffsetY">Y:</label>
                    <input type="number" id="gridOffsetY" value="0" step="1" />
                    <label for="snapTolerance" style="margin-left:12px">Snap tolerance (%):</label>
                    <input type="number" id="snapTolerance" value="8" min="0" max="100" step="1" />
                    <button id="snapColorsBtn">Snap Colors</button>
                    <button id="downloadNormalized">Download Normalized</button>
                    <div id="analysisInfo" aria-live="polite" style="margin:8px 0;color:#555"></div>
                    <canvas id="sourceCanvas" aria-label="Source image with grid overlay"></canvas>
                    <canvas id="normalizedCanvas" aria-label="Normalized pixel art output"></canvas>
                    <div id="paletteSwatches" class="palette" aria-label="Palette preview"></div>
                </div>
            </section>
            <section id="particles-panel" role="tabpanel" aria-labelledby="particles-tab" hidden>
                <div class="particles-app">
                    <h2>Particle Animator</h2>

                    <div class="particles-control-group">
                        <h3>Image</h3>
                        <div class="control-row">
                            <label for="particleImageLoad" class="btn">Load Image</label>
                            <input type="file" id="particleImageLoad" accept="image/png" class="visually-hidden" />
                            <span id="particleImageName" class="file-name-display">No file chosen</span>
                            <button id="clearParticleImage" hidden>Clear</button>
                        </div>
                        <div class="control-row" id="particleColorRow">
                            <label for="particleColor">Particle color</label>
                            <input type="color" id="particleColor" value="#ffffff" />
                            <input type="range" id="particleAlpha" min="0" max="255" value="255" step="1" title="Alpha" />
                            <span id="particleAlphaLabel" class="unit">255</span>
                        </div>
                    </div>

                    <div class="particles-control-group">
                        <h3>Canvas</h3>
                        <div class="control-row">
                            <label for="canvasWidth">Width (px)</label>
                            <input type="number" id="canvasWidth" value="64" min="1" max="3840" step="1" />
                        </div>
                        <div class="control-row">
                            <label for="canvasHeight">Height (px)</label>
                            <input type="number" id="canvasHeight" value="64" min="1" max="2160" step="1" />
                        </div>
                        <div class="control-row">
                            <label for="canvasScale">Display scale</label>
                            <input type="number" id="canvasScale" value="8" min="1" max="32" step="1" />
                            <span class="unit">×</span>
                        </div>
                        <button id="applyCanvasSize">Apply</button>
                    </div>

                    <div class="particles-control-group">
                        <h3>Canvas background</h3>
                        <div class="control-row">
                            <div class="bg-picker" role="group" aria-label="Canvas background">
                                <button class="bg-btn bg-btn--black active" data-bg="black" aria-pressed="true" title="Black"></button>
                                <button class="bg-btn bg-btn--white" data-bg="white" aria-pressed="false" title="White"></button>
                                <button class="bg-btn bg-btn--checker" data-bg="checker" aria-pressed="false" title="Transparent"></button>
                            </div>
                        </div>
                    </div>

                    <div class="particles-canvas-wrap particles-canvas-bg--black">
                        <canvas id="particleCanvas" width="64" height="64"></canvas>
                    </div>

                    <div class="particles-control-group">
                        <h3>Particle system &mdash; Origin</h3>
                        <div class="control-row">
                            <label for="originX">X</label>
                            <input type="number" id="originX" value="32" step="1" />
                            <label for="originY">Y</label>
                            <input type="number" id="originY" value="32" step="1" />
                        </div>
                        <div class="control-row">
                            <label for="originW">Box width</label>
                            <input type="number" id="originW" value="10" min="0" step="1" />
                            <label for="originH">Box height</label>
                            <input type="number" id="originH" value="10" min="0" step="1" />
                        </div>
                    </div>

                    <div class="particles-control-group">
                        <h3>Particle system &mdash; Count</h3>
                        <div class="control-row">
                            <label for="particleCount">Count</label>
                            <input type="number" id="particleCount" value="10" min="0" step="1" />
                            <button id="spawnParticles">Spawn</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </body>
</html>
