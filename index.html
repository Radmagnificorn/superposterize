<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Super Posterizer</title>
    <script src="./superposterizer.js" defer></script>
    <link rel="stylesheet" href="./superposterizer.css">
</head>
    <body>
        <div class="tabs">
            <div role="tablist" aria-label="Apps" class="tablist">
                <button role="tab" aria-selected="true" aria-controls="posterizer-panel" id="posterizer-tab">Posterizer</button>
                <button role="tab" aria-selected="false" aria-controls="newapp-panel" id="newapp-tab" tabindex="-1">Pixel art normalizer</button>
                <button role="tab" aria-selected="false" aria-controls="particles-panel" id="particles-tab" tabindex="-1">Particles</button>
            </div>

            <section id="posterizer-panel" role="tabpanel" aria-labelledby="posterizer-tab">
                <input id="fileSelect" type="file"/>
                <button id="resetButton">Reset</button>
                <button id="downloadImage">Download</button>
                <button id='testButton'>Posterize</button>
                H Step: <input type="number" id="hSplit" min="0" max="1" value="0.01">
                S Step: <input type="number" id="sSplit" min="0" max="0.5" value="0.01" step="0.01">
                <label for="toggleGuy">Toggle Guy: </label>
                <input type="checkbox" name="toggleGuy" id="toggleGuy">
                Scale: <input type="number" id="scale" value="1">
                <canvas id="imageDisplay"></canvas>
                <div id="valueControls">
                    <label for="margin">Margin: </label>
                    <input type="number" id="margin" name="margin" min="0" max="1" value="0">
                    
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.1">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.2">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.5">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.8">
                    <input type="range" class="valueSlider" min="0" max="1" step="0.05" value="0.9">
                    
                </div>
                <img id="sampleCharacter" src="./samplecharacter.png"/>
            </section>

            <section id="newapp-panel" role="tabpanel" aria-labelledby="newapp-tab" hidden>
                <div class="new-app">
                    <h2>Pixel Art Normalizer</h2>
                    <input id="aiFileSelect" type="file" accept="image/*" />
                    <button id="normalizeButton">Analyze + Normalize</button>
                    <label for="normScale">Display Scale: </label>
                    <input type="number" id="normScale" value="8" min="1" step="1" />
                    <label style="margin-left:12px"><input type="checkbox" id="autoDetect" /> Auto-detect grid</label>
                    <label for="blockW">Block W:</label>
                    <input type="number" id="blockW" value="8" min="1" step="1" />
                    <label for="blockH">Block H:</label>
                    <input type="number" id="blockH" value="8" min="1" step="1" />
                    <label for="gridOffsetX" style="margin-left:12px">Grid offset X:</label>
                    <input type="number" id="gridOffsetX" value="0" step="1" />
                    <label for="gridOffsetY">Y:</label>
                    <input type="number" id="gridOffsetY" value="0" step="1" />
                    <label for="snapTolerance" style="margin-left:12px">Snap tolerance (%):</label>
                    <input type="number" id="snapTolerance" value="8" min="0" max="100" step="1" />
                    <button id="snapColorsBtn">Snap Colors</button>
                    <button id="downloadNormalized">Download Normalized</button>
                    <div id="analysisInfo" aria-live="polite" style="margin:8px 0;color:#555"></div>
                    <canvas id="sourceCanvas" aria-label="Source image with grid overlay"></canvas>
                    <canvas id="normalizedCanvas" aria-label="Normalized pixel art output"></canvas>
                    <div id="paletteSwatches" class="palette" aria-label="Palette preview"></div>
                </div>
            </section>
            <section id="particles-panel" role="tabpanel" aria-labelledby="particles-tab" hidden>
                <div class="particles-app">
                    <h2>Particle Animator</h2>

                    <div class="particles-control-group">
                        <h3>Image</h3>
                        <div class="control-row">
                            <label for="particleImageLoad" class="btn">Load Image</label>
                            <input type="file" id="particleImageLoad" accept="image/png" class="visually-hidden" />
                            <span id="particleImageName" class="file-name-display">No file chosen</span>
                            <button id="clearParticleImage" hidden>Clear</button>
                        </div>
                        <div class="control-row" id="particleColorRow">
                            <label for="particleColor">Particle color</label>
                            <input type="color" id="particleColor" value="#ffffff" />
                            <input type="range" id="particleAlpha" min="0" max="255" value="255" step="1" title="Alpha" />
                            <span id="particleAlphaLabel" class="unit">255</span>
                        </div>
                    </div>

                    <div class="particles-control-group">
                        <h3>Canvas</h3>
                        <div class="control-row">
                            <label for="canvasWidth">Width (px)</label>
                            <input type="number" id="canvasWidth" value="64" min="1" max="3840" step="1" />
                        </div>
                        <div class="control-row">
                            <label for="canvasHeight">Height (px)</label>
                            <input type="number" id="canvasHeight" value="64" min="1" max="2160" step="1" />
                        </div>
                        <div class="control-row">
                            <label for="canvasScale">Display scale</label>
                            <input type="number" id="canvasScale" value="8" min="1" max="32" step="1" />
                            <span class="unit">×</span>
                        </div>
                        <button id="applyCanvasSize">Apply</button>
                    </div>

                    <div class="particles-control-group">
                        <h3>Canvas background</h3>
                        <div class="control-row">
                            <div class="bg-picker" role="group" aria-label="Canvas background">
                                <button class="bg-btn bg-btn--black active" data-bg="black" aria-pressed="true" title="Black"></button>
                                <button class="bg-btn bg-btn--white" data-bg="white" aria-pressed="false" title="White"></button>
                                <button class="bg-btn bg-btn--checker" data-bg="checker" aria-pressed="false" title="Transparent"></button>
                            </div>
                        </div>
                    </div>

                    <div class="particles-canvas-wrap particles-canvas-bg--black">
                        <canvas id="particleCanvas" width="64" height="64"></canvas>
                    </div>

                    <div class="particles-control-group">
                        <h3>Particle system &mdash; Origin</h3>
                        <div class="control-row">
                            <label for="originX">X</label>
                            <input type="number" id="originX" value="32" step="1" />
                            <label for="originY">Y</label>
                            <input type="number" id="originY" value="32" step="1" />
                        </div>
                        <div class="control-row">
                            <label for="originW">Box width</label>
                            <input type="number" id="originW" value="10" min="0" step="1" />
                            <label for="originH">Box height</label>
                            <input type="number" id="originH" value="10" min="0" step="1" />
                        </div>
                    </div>

                    <div class="particles-control-group">
                        <h3>Particle system &mdash; Count</h3>
                        <div class="control-row">
                            <label for="particleCount">Count</label>
                            <input type="number" id="particleCount" value="10" min="0" step="1" />
                            <button id="spawnParticles">Spawn</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <script>
        (function() {
            const tabs = document.querySelectorAll('[role="tab"]');
            const panels = document.querySelectorAll('[role="tabpanel"]');

            function activateTab(tab) {
                tabs.forEach(t => {
                    const selected = t === tab;
                    t.setAttribute('aria-selected', selected);
                    t.setAttribute('tabindex', selected ? '0' : '-1');
                });
                panels.forEach(p => {
                    p.hidden = (p.id !== tab.getAttribute('aria-controls'));
                });
                tab.focus();
            }

            tabs.forEach(t => {
                t.addEventListener('click', () => activateTab(t));
                t.addEventListener('keydown', (e) => {
                    const currentIndex = Array.prototype.indexOf.call(tabs, document.activeElement);
                    if (e.key === 'ArrowRight') { e.preventDefault(); activateTab(tabs[(currentIndex + 1) % tabs.length]); }
                    if (e.key === 'ArrowLeft') { e.preventDefault(); activateTab(tabs[(currentIndex - 1 + tabs.length) % tabs.length]); }
                });
            });
        })();

        (function() {
            const canvas = document.getElementById('particleCanvas');
            const widthInput = document.getElementById('canvasWidth');
            const heightInput = document.getElementById('canvasHeight');
            const scaleInput = document.getElementById('canvasScale');
            const applyBtn = document.getElementById('applyCanvasSize');
            const imageLoad = document.getElementById('particleImageLoad');
            const imageNameDisplay = document.getElementById('particleImageName');
            const clearImageBtn = document.getElementById('clearParticleImage');
            const colorRow = document.getElementById('particleColorRow');
            const colorPicker = document.getElementById('particleColor');
            const alphaSlider = document.getElementById('particleAlpha');
            const alphaLabel = document.getElementById('particleAlphaLabel');
            const originX = document.getElementById('originX');
            const originY = document.getElementById('originY');
            const originW = document.getElementById('originW');
            const originH = document.getElementById('originH');
            const particleCountInput = document.getElementById('particleCount');
            const spawnBtn = document.getElementById('spawnParticles');

            let loadedImage = null;

            class Particle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                }
            }

            let particles = [];

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return { r, g, b };
            }

            function drawOriginBox() {
                const ctx = canvas.getContext('2d');
                const x = parseFloat(originX.value) || 0;
                const y = parseFloat(originY.value) || 0;
                const w = Math.max(0, parseFloat(originW.value) || 0);
                const h = Math.max(0, parseFloat(originH.value) || 0);
                if (w === 0 && h === 0) return;
                const left = Math.round(x - w / 2);
                const top  = Math.round(y - h / 2);
                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(left + 0.5, top + 0.5, w, h);
                ctx.restore();
            }

            function spawnParticles() {
                const count = Math.max(0, parseInt(particleCountInput.value, 10) || 0);
                const cx = parseFloat(originX.value) || 0;
                const cy = parseFloat(originY.value) || 0;
                const bw = Math.max(0, parseFloat(originW.value) || 0);
                const bh = Math.max(0, parseFloat(originH.value) || 0);
                const left = cx - bw / 2;
                const top  = cy - bh / 2;
                particles = [];
                for (let i = 0; i < count; i++) {
                    const px = bw > 0 ? left + Math.random() * bw : cx;
                    const py = bh > 0 ? top  + Math.random() * bh : cy;
                    particles.push(new Particle(px, py));
                }
                redraw();
            }

            function drawParticleSprite(ctx, x, y) {
                if (loadedImage) {
                    ctx.drawImage(loadedImage, Math.round(x), Math.round(y));
                } else {
                    const { r, g, b } = hexToRgb(colorPicker.value);
                    const a = parseInt(alphaSlider.value, 10) / 255;
                    ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
                    ctx.fillRect(Math.round(x), Math.round(y), 1, 1);
                }
            }

            function redraw() {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) {
                    drawParticleSprite(ctx, p.x, p.y);
                }
                drawOriginBox();
            }

            function applySize() {
                const w = Math.max(1, parseInt(widthInput.value, 10) || 64);
                const h = Math.max(1, parseInt(heightInput.value, 10) || 64);
                const scale = Math.max(1, parseInt(scaleInput.value, 10) || 8);
                widthInput.value = w;
                heightInput.value = h;
                scaleInput.value = scale;
                canvas.width = w;
                canvas.height = h;
                canvas.style.width = (w * scale) + 'px';
                canvas.style.height = (h * scale) + 'px';
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, w, h);
                redraw();
            }

            imageLoad.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                imageNameDisplay.textContent = file.name;
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = function() {
                    loadedImage = img;
                    URL.revokeObjectURL(url);
                    colorRow.hidden = true;
                    clearImageBtn.hidden = false;
                    redraw();
                };
                img.src = url;
            });

            clearImageBtn.addEventListener('click', function() {
                loadedImage = null;
                imageLoad.value = '';
                imageNameDisplay.textContent = 'No file chosen';
                clearImageBtn.hidden = true;
                colorRow.hidden = false;
                redraw();
            });

            colorPicker.addEventListener('input', function() {
                if (!loadedImage) redraw();
            });

            alphaSlider.addEventListener('input', function() {
                alphaLabel.textContent = alphaSlider.value;
                if (!loadedImage) redraw();
            });

            applyBtn.addEventListener('click', applySize);
            applySize();

            [originX, originY, originW, originH].forEach(input => {
                input.addEventListener('input', redraw);
            });

            spawnBtn.addEventListener('click', spawnParticles);

            // Canvas background picker
            const canvasWrap = canvas.closest('.particles-canvas-wrap');
            document.querySelectorAll('.bg-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.bg-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-pressed', 'false');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-pressed', 'true');
                    canvasWrap.className = 'particles-canvas-wrap particles-canvas-bg--' + this.dataset.bg;
                });
            });
        })();
        </script>
    </body>
</html>
